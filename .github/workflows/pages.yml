# Publiceert dist/ naar GitHub Pages (het leesarchief lees mee).
#
# Er wordt NIET gebouwd in de CI: bouwen gebeurt lokaal (python run_all.py), en enkel
# de reeds gecommitte map dist/ wordt gepubliceerd. Zo blijft de export (die privegegevens
# bevat) buiten de CI en buiten de publieke repo.
#
# Eenmalig instellen: GitHub -> repo -> Settings -> Pages -> Source = "GitHub Actions".
name: Publiceer naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
